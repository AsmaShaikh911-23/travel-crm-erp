<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Settings — Travel CRM</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="nav-placeholder"></div>

  <main class="page">
    <h1>Settings</h1>
    <form id="settingsForm" class="inline-form settings-form">
      <input type="text" id="company_name" placeholder="Company Name">
      <input type="text" id="n8n_webhook_url" placeholder="n8n Webhook URL">
      <input type="text" id="email_provider" placeholder="Email Provider">
      <input type="text" id="whatsapp_api" placeholder="WhatsApp API">
      <input type="text" id="instagram_token" placeholder="Instagram Token">
      <input type="text" id="facebook_token" placeholder="Facebook Token">
      <select id="theme">
        <option value="light">Light</option>
        <option value="dark">Dark</option>
      </select>
      <button type="submit">Save Settings</button>
    </form>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabaseClient.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/settings.js"></script>
</body>
</html>
