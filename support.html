<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Support — Travel CRM</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div id="nav-placeholder"></div>

  <main class="page">
    <h1>Support Automation</h1>

    <form id="supportForm" class="inline-form">
      <select id="sa_booking" required></select>
      <select id="sa_type" required>
        <option value="">Type</option>
        <option value="reminder">Reminder</option>
        <option value="document">Document</option>
        <option value="alert">Alert</option>
      </select>
      <input type="text" id="sa_message" placeholder="Message" required>
      <button type="submit">Send Action</button>
    </form>

    <table class="data-table">
      <thead>
        <tr><th>Customer</th><th>Type</th><th>Message</th><th>Sent At</th></tr>
      </thead>
      <tbody id="supportTableBody"></tbody>
    </table>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabaseClient.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/support.js"></script>
</body>
</html>
