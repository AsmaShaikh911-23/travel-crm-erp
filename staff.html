<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Staff — Travel CRM</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div id="nav-placeholder"></div>

  <main class="page">
    <h1>Staff</h1>

    <form id="staffForm" class="inline-form">
      <input type="text" id="s_name" placeholder="Staff name" required>
      <input type="number" id="s_assigned" placeholder="Assigned leads" required>
      <input type="number" id="s_conversions" placeholder="Conversions" required>
      <input type="number" id="s_commission" placeholder="Commission (₹)" required>
      <button type="submit">Add Staff</button>
    </form>

    <table class="data-table">
      <thead>
        <tr><th>Name</th><th>Assigned Leads</th><th>Conversions</th><th>Commission</th><th>Performance</th></tr>
      </thead>
      <tbody id="staffTableBody"></tbody>
    </table>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabaseClient.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/staff.js"></script>
</body>
</html>
