<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Staff — Travel CRM</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div id="nav-placeholder"></div>

  <main class="page">
    <h1>Staff</h1>

    <form id="staffForm" class="inline-form">
      <input type="text" id="s_name" placeholder="Staff name" required>
      <input type="number" id="s_assigned" placeholder="Assigned leads" required>
      <input type="number" id="s_conversions" placeholder="Conversions" required>
      <input type="number" id="s_commission" placeholder="Commission (₹)" required>
      <button type="submit">Add Staff</button>
    </form>

    <form id="reassignForm" class="inline-form">
      <div style="display:flex;flex-direction:column;min-width:220px;">
        <label for="reassignLead" style="font-weight:600;margin-bottom:6px;">Select Lead (Client)</label>
        <select id="reassignLead" required></select>
      </div>
      <div style="display:flex;flex-direction:column;min-width:220px;">
        <label for="reassignStaff" style="font-weight:600;margin-bottom:6px;">Assign To (Staff)</label>
        <select id="reassignStaff" required></select>
      </div>
      <button type="submit">Reassign Lead</button>
    </form>

    <div class="inline-form" style="align-items:flex-start;">
      <div style="display:flex;flex-direction:column;min-width:220px;">
        <label for="staffPicker" style="font-weight:600;margin-bottom:6px;">Select Staff</label>
        <select id="staffPicker" style="min-width:220px;"></select>
      </div>
      <div id="staffDetailPanel" class="card-panel" style="flex:1;min-width:420px;">Select a staff member to view details</div>
    </div>

    <div id="staffDirectory" class="staff-directory"></div>

    <div id="leadProfilePanel" class="card-panel"></div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabaseClient.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/staff.js"></script>
</body>
</html>
