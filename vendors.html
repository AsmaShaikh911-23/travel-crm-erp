<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Vendors — Travel CRM</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div id="nav-placeholder"></div>

  <main class="page">
    <h1>Vendors</h1>

    <form id="vendorForm" class="inline-form">
      <input type="text" id="v_name" placeholder="Vendor name" required>
      <select id="v_type" required>
        <option value="">Type</option>
        <option value="Hotel">Hotel</option>
        <option value="Airline">Airline</option>
        <option value="Transport">Transport</option>
        <option value="Guide">Guide</option>
      </select>
      <input type="text" id="v_contact" placeholder="Contact (phone/email)" required>
      <input type="number" id="v_cost" placeholder="Cost (₹)" required>
      <button type="submit">Add Vendor</button>
    </form>

    <table class="data-table">
      <thead>
        <tr><th>Name</th><th>Type</th><th>Contact</th><th>Cost (₹)</th></tr>
      </thead>
      <tbody id="vendorsTableBody"></tbody>
    </table>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabaseClient.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/vendors.js"></script>
</body>
</html>
