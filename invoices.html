<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Invoices — Travel CRM</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="nav-placeholder"></div>

  <main class="page">
    <h1>Invoices</h1>
    <form id="manualInvoiceForm" class="inline-form" style="margin-bottom:18px;">
      <input type="text" id="inv_client_name" placeholder="Client name" required>
      <input type="text" id="inv_package_name" placeholder="Package name" required>
      <input type="number" id="inv_amount" placeholder="Amount (₹)" required>
      <input type="number" id="inv_gst_percent" placeholder="GST %" value="18" required>
      <input type="number" id="inv_other_tax_percent" placeholder="Other Tax %" value="0">
      <input type="date" id="inv_due_date" placeholder="Due date">
      <button type="submit">Create Invoice (Manual)</button>
      <div id="inv_preview" style="margin-left:12px;min-width:220px;align-self:center">GST: ₹0 · Total: ₹0</div>
    </form>

    <table class="data-table">
      <thead>
        <tr>
          <th>Invoice #</th>
          <th>Client</th>
          <th>Package</th>
          <th>Amount</th>
          <th>GST</th>
          <th>Status</th>
          <th>Due Date</th>
          <th>Generated</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="invoicesTableBody"></tbody>
    </table>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabaseClient.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/invoices.js"></script>
</body>
</html>
