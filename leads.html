<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Leads — Travel CRM</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div id="nav-placeholder"></div>

  <main class="page">
    <h1>Leads</h1>

    <form id="leadForm" class="inline-form">
      <input type="text" id="l_name" placeholder="Name" required>
      <input type="text" id="l_phone" placeholder="Phone" required>
      <input type="email" id="l_email" placeholder="Email">
      <input type="text" id="l_destination" placeholder="Destination" required>
      <input type="number" id="l_budget" placeholder="Budget (₹)" required>
      <select id="l_source" required>
        <option value="">Source</option>
        <option value="Website">Website</option>
        <option value="Instagram">Instagram</option>
        <option value="Facebook">Facebook</option>
        <option value="Google Maps">Google Maps</option>
      </select>
      <button type="submit">Add Lead</button>
    </form>

    <div class="inline-form">
      <select id="scrapeSource">
        <option value="all">All Sources</option>
        <option value="instagram">Instagram</option>
        <option value="facebook">Facebook</option>
        <option value="website">Website</option>
      </select>
      <button type="button" id="scrapeLeadsBtn">Scrape Leads</button>
    </div>

    <div class="card-panel">
      <h3>Latest Scrape Status</h3>
      <p id="scrapeStatus">Loading…</p>
    </div>
    <div id="toast" class="toast" aria-live="polite" role="status"></div>

    <div class="card-panel">
      <h3>Scrape History</h3>
      <div style="display:flex;gap:10px;align-items:center;margin-bottom:10px;">
        <button id="refreshScrapeHistory" class="secondary-btn">Refresh History</button>
        <small class="muted">Shows recent scrape attempts recorded in <em>scrape_logs</em>.</small>
      </div>
      <table class="data-table">
        <thead>
          <tr><th>Time</th><th>Source</th><th>Status</th><th>Notes</th></tr>
        </thead>
        <tbody id="scrapeHistoryBody">
          <tr><td colspan="4" class="muted">Loading history…</td></tr>
        </tbody>
      </table>
    </div>

    <table class="data-table">
      <thead>
        <tr>
          <th>Name</th><th>Phone</th><th>Destination</th><th>Budget</th>
          <th>Source</th><th>Status</th><th>Score</th>
        </tr>
      </thead>
      <tbody id="leadsTableBody"></tbody>
    </table>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabaseClient.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/leads.js"></script>
</body>
</html>
